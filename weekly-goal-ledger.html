<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<meta name="theme-color" content="#10201B">
<title>Goal Ledger</title>
<style>
  :root {
    --bg: #10201B;
    --surface: #172A23;
    --surface-2: #1E352C;
    --line: #2A443A;
    --ink: #E9F0EA;
    --muted: #8FA79B;
    --faint: #5C7268;
    --pip: #E0B453;
    --pip-dim: #6E5A2A;
    --note-lit: #7A9C74;
    --done: #E0B453;
    --danger: #D07A6A;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    overflow: hidden; /* the page itself never scrolls — only .app-scroll does */
    background: var(--bg);
  }
  body {
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.4;
  }
  .app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh; /* dvh accounts for mobile browser chrome where supported */
    max-width: 560px;
    margin: 0 auto;
  }
  .app-header { flex: none; padding: 14px 12px 0; }
  .app-scroll {
    flex: 1; min-height: 0; /* required for a flex child to actually scroll instead of overflowing */
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    padding: 0 12px 14px;
  }
  .app-footer {
    flex: none; display: flex; justify-content: center;
    padding: 10px 12px calc(12px + env(safe-area-inset-bottom, 0px));
    background: var(--bg);
  }

  /* ---------- header / week nav ---------- */
  .masthead {
    display: flex; align-items: center; justify-content: space-between;
    margin: 2px 2px 14px;
  }
  .masthead h1 {
    font-family: var(--mono);
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--muted); margin: 0;
  }
  .titlegroup { display: flex; align-items: center; gap: 8px; }
  .viewswitch { display: flex; gap: 4px; }
  .switchbtn {
    background: none; border: 1px solid var(--line); color: var(--muted);
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase;
    padding: 3px 7px; border-radius: 6px; cursor: pointer;
    transition: color 120ms ease, border-color 120ms ease, background 120ms ease;
  }
  .switchbtn.active {
    color: var(--pip); border-color: var(--pip-dim); background: rgba(224,180,83,0.10);
  }
  .weeknav {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 16px;
  }
  .weeknav button.arrow {
    background: var(--surface); border: 1px solid var(--line); color: var(--ink);
    width: 40px; height: 40px; border-radius: 8px; font-size: 16px;
    cursor: pointer; flex: none;
  }
  .weeknav .weeklabel {
    flex: 1; text-align: center;
    font-family: var(--mono); font-size: 14px; font-weight: 600;
    letter-spacing: 0.02em;
  }
  .weeknav .sub {
    display: block; font-size: 11px; font-weight: 400; color: var(--muted);
    margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .weeknav .sub.current {
    color: rgb(188,204,195);
    text-shadow: 0 0 6px rgba(143,167,155,0.65), 0 0 2px rgba(233,240,234,0.5);
  }
  .fw {
    color: var(--note-lit); opacity: 0.45; font-size: 13px; display: inline-block;
    transition: color 150ms ease, opacity 150ms ease;
  }
  .fw.lit {
    color: var(--pip); opacity: 1;
    filter: drop-shadow(0 0 3px rgba(224,180,83,0.5));
  }
  .todaybtn {
    background: none; border: none; color: var(--pip);
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.08em;
    cursor: pointer; padding: 4px 6px; text-transform: uppercase;
  }
  #todayBtn { letter-spacing: 0.02em; word-spacing: -4.5px; padding: 4px 4px; }

  /* ---------- goal cards ---------- */
  .goal {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 12px 12px;
    margin-bottom: 12px;
  }
  .goal.compact { padding: 7px 10px; margin-bottom: 6px; }
  .goal.compact .goal-head { margin-bottom: 0; }
  .goal.compact .goal-head.compact-row {
    cursor: pointer;
    margin: -7px -10px; padding: 9px 10px;
    border-radius: 9px;
    transition: background 100ms ease;
  }
  .goal.compact .goal-head.compact-row:active { background: var(--surface-2); }
  .goal.compact .goal-head.compact-row.marked { background: var(--pip); }
  .goal.compact .goal-head.compact-row.marked .goal-name,
  .goal.compact .goal-head.compact-row.marked .goal-name .detail,
  .goal.compact .goal-head.compact-row.marked .notehint {
    color: #241C08;
  }
  .goal.compact .goal-head.compact-row.marked .counter {
    background: rgba(36,28,8,0.16); border-color: rgba(36,28,8,0.3); color: #241C08;
  }
  .goal.paused .goal-head.compact-row { pointer-events: none; }
  .goal.paused .goal-head.compact-row .goal-name { pointer-events: auto; }
  .goal.compact .goal-head.compact-row .goal-name { flex: 0 1 auto; }
  .compact-fill { flex: 1; min-width: 8px; }
  .compactbadge {
    flex: none; font-family: var(--mono); font-size: 11px; font-weight: 700;
    color: var(--muted); margin-left: 2px;
  }
  .goal.compact .goal-head.compact-row.marked .compactbadge { color: #241C08; }
  .goal.paused { opacity: 0.5; }
  .goal.paused .days { pointer-events: none; }
  .goal-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; margin-bottom: 10px;
  }
  .reorderbtns { display: flex; gap: 4px; flex: none; }
  .reorderbtns button {
    width: 26px; height: 26px; padding: 0;
    border-radius: 7px; border: 1px solid var(--line);
    background: var(--surface-2); color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; line-height: 1; cursor: pointer;
  }
  .reorderbtns button:disabled { opacity: 0.25; cursor: default; }
  .reorderbtns button:active:not(:disabled) { background: var(--line); color: var(--ink); }
  .notedot {
    flex: none; width: 15px; height: 15px;
    display: flex; align-items: center; justify-content: center;
    color: var(--faint); opacity: 0.45; cursor: pointer;
  }
  .notedot svg { width: 100%; height: 100%; display: block; }
  .notedot.lit {
    color: var(--note-lit); opacity: 0.8;
    filter: drop-shadow(0 0 1.5px rgba(122,156,116,0.35));
  }
  .goal-name {
    font-weight: 600; font-size: 15px;
    background: none; border: none; color: var(--ink); text-align: left;
    padding: 2px 0; cursor: pointer; font-family: var(--sans);
    flex: 1; min-width: 0;
  }
  .goal-name .notehint { color: var(--faint); font-weight: 400; font-size: 12px; margin-left: 6px; }
  .goal-name .detail { color: var(--muted); font-weight: 400; font-size: 13px; }
  .counter {
    font-family: var(--mono); font-size: 14px; font-weight: 700;
    border: 1px solid var(--line);
    color: var(--muted);
    border-radius: 999px; padding: 3px 11px;
    flex: none; letter-spacing: 0.04em;
    transition: all 120ms ease;
  }
  .counter.met {
    background: var(--done); border-color: var(--done); color: #241C08;
  }
  .days { display: flex; gap: 5px; }
  .cell {
    flex: 1 1 0; min-width: 0;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 6px;
    height: 36px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
    position: relative;
    transition: background 100ms ease;
  }
  .cell:active { background: var(--line); }
  .cell.future { opacity: 0.35; cursor: default; }
  .cell.today { border-color: var(--pip-dim); box-shadow: inset 0 0 0 1px var(--pip-dim); }
  .cell .dnum {
    font-family: var(--mono); font-size: 10px; color: var(--faint); line-height: 1;
  }
  .cell.today .dnum { color: var(--pip); }
  .cell.marked { background: var(--pip); }
  .cell.marked .dnum { color: #241C08; }
  .cell.marked .multicount {
    font-family: var(--mono); font-size: 9px; font-weight: 700; color: #241C08;
    line-height: 1; margin-top: 1px;
  }
  .dayrow {
    display: flex; gap: 5px; margin: 0 2px 8px;
  }
  .dayrow span {
    flex: 1 1 0; text-align: center;
    font-family: var(--mono); font-size: 10px;
    color: var(--faint); letter-spacing: 0.06em; text-transform: uppercase;
  }
  .dayrow .fulldate {
    font-size: 14px; font-weight: 600; letter-spacing: 0.02em;
    text-transform: none; color: var(--ink);
  }

  .empty {
    text-align: center; color: var(--muted); padding: 44px 20px;
    border: 1px dashed var(--line); border-radius: 10px; font-size: 14px;
  }

  /* ---------- add button ---------- */
  .fab {
    background: var(--pip); color: #241C08;
    border: none; border-radius: 999px;
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 13px 26px; cursor: pointer;
    box-shadow: 0 4px 18px rgba(0,0,0,0.45);
  }

  /* ---------- modal ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(6,12,10,0.72);
    display: none; align-items: flex-end; justify-content: center; z-index: 50;
  }
  .overlay.open { display: flex; }
  .sheet {
    background: var(--surface); border: 1px solid var(--line); border-bottom: none;
    border-radius: 14px 14px 0 0;
    width: 100%; max-width: 560px; max-height: 86vh; overflow-y: auto;
    padding: 18px 16px 28px;
  }
  .sheet h2 {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
    margin: 0 0 14px;
    display: flex; align-items: center; gap: 6px;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px;
    letter-spacing: 0.02em;
  }
  .field input, .field textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--line);
    color: var(--ink); border-radius: 8px; padding: 10px 11px;
    font-size: 15px; font-family: var(--sans);
  }
  .field input[type="number"] { font-family: var(--mono); }
  .field textarea { resize: vertical; min-height: 60px; }
  .row2 { display: flex; gap: 10px; }
  .row2 .field { flex: 1; }
  .btnrow { display: flex; gap: 10px; margin-top: 6px; }
  .btn {
    flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--line);
    background: var(--surface-2); color: var(--ink); font-size: 14px; font-weight: 600;
    cursor: pointer; font-family: var(--sans);
  }
  .btn.primary { background: var(--pip); border-color: var(--pip); color: #241C08; }
  .btn.quiet { background: none; }
  .btn.danger { color: var(--danger); border-color: rgba(208,122,106,0.4); }
  .divider { border: none; border-top: 1px solid var(--line); margin: 18px 0 14px; }

  .histstrip {
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
  }
  .histstrip .h {
    border: 1px solid var(--line); border-radius: 6px; padding: 3px 7px;
  }
  .histstrip .h.met { color: var(--done); border-color: var(--pip-dim); }

  .notelog { margin-top: 8px; }
  .todolist { margin-top: 4px; }
  .todoitem {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid var(--line);
  }
  .todoitem:last-child { border-bottom: none; }
  .todocheck {
    flex: none; width: 20px; height: 20px; border-radius: 6px;
    border: 1px solid var(--line); background: var(--surface-2);
    cursor: pointer; padding: 0;
  }
  .todoitem.done .todocheck { background: var(--pip); border-color: var(--pip); }
  .todotext { flex: 1; min-width: 0; font-size: 14px; color: var(--ink); cursor: pointer; }
  .todoitem.done .todotext { color: var(--faint); text-decoration: line-through; }
  .note {
    border-left: 2px solid var(--line); padding: 2px 0 2px 10px; margin-bottom: 10px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
  }
  .note .ncontent { min-width: 0; flex: 1; }
  .note .ndate {
    font-family: var(--mono); font-size: 11px; color: var(--faint); display: block;
  }
  .note .ntext { font-size: 14px; color: var(--ink); }
  .note.auto .ntext { color: var(--muted); font-style: italic; }
  .note .ndelete {
    flex: none; background: none; border: none; color: var(--faint);
    font-size: 16px; line-height: 1; padding: 2px 4px; cursor: pointer;
  }
  .note .ndelete:active { color: var(--danger); }

  .toast {
    position: fixed; bottom: 78px; left: 50%; transform: translateX(-50%);
    background: var(--surface-2); border: 1px solid var(--line); color: var(--muted);
    font-family: var(--mono); font-size: 12px; padding: 8px 14px; border-radius: 8px;
    opacity: 0; transition: opacity 200ms ease; pointer-events: none; z-index: 60;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

<div class="app">

  <div class="app-header">
    <div class="masthead">
      <div class="titlegroup">
        <h1>Goal Ledger</h1>
        <div class="viewswitch">
          <button class="switchbtn" id="weekViewBtn">Week View</button>
          <button class="switchbtn" id="todayOnlyBtn">Today Only</button>
        </div>
      </div>
      <div style="display:flex;gap:2px;align-items:center">
        <button class="todaybtn" id="todayBtn" style="visibility:hidden">Go to Current Week</button>
        <button class="todaybtn" id="todoBtn" style="color:var(--muted)">To-Do</button>
        <button class="todaybtn" id="dataBtn" style="color:var(--muted)">Data</button>
      </div>
    </div>

    <div class="weeknav" id="weekNav">
      <button class="arrow" id="prevWeek" aria-label="Previous week">‹</button>
      <div class="weeklabel" id="weekLabel"></div>
      <button class="arrow" id="nextWeek" aria-label="Next week">›</button>
    </div>

    <div class="dayrow" id="dayRow"></div>
  </div>

  <div class="app-scroll">
    <div id="goalList"></div>
  </div>

  <div class="app-footer">
    <button class="fab" id="addBtn">+ Add goal</button>
  </div>

</div>

<!-- Add / Edit sheet -->
<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function () {
  const STORAGE_KEY = 'weekly-goal-ledger-v1';
  const DAYS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

  let state = { goals: [], marks: {}, todos: [] };
  let viewWeek = mondayOf(new Date());   // ISO string of the Monday being viewed
  let saveTimer = null;
  let editingId = null;

  // ---------- date helpers (all local time) ----------
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function iso(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
  function fromISO(s) { const p = s.split('-'); return new Date(+p[0], +p[1] - 1, +p[2]); }
  function mondayOf(d) {
    const c = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    c.setDate(c.getDate() - ((c.getDay() + 6) % 7));
    return iso(c);
  }
  function addDays(isoStr, n) { const d = fromISO(isoStr); d.setDate(d.getDate() + n); return iso(d); }
  function weekDates(weekStart) { return Array.from({ length: 7 }, (_, i) => addDays(weekStart, i)); }
  function fmtShort(isoStr) {
    const d = fromISO(isoStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  function fmtNote(isoStr) {
    const d = fromISO(isoStr);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ---------- persistence ----------
  // Dual-mode: inside Claude, window.storage (artifact storage) is used.
  // Standalone (hosted page added to the iPhone home screen), it falls
  // back to the browser's localStorage, which lives on the device.
  const store = {
    async get(key) {
      if (window.storage) return window.storage.get(key);
      const v = localStorage.getItem(key);
      return v === null ? null : { key, value: v };
    },
    async set(key, value) {
      if (window.storage) return window.storage.set(key, value);
      localStorage.setItem(key, value);
      return { key, value };
    }
  };

  async function load() {
    try {
      const res = await store.get(STORAGE_KEY);
      if (res && res.value) state = JSON.parse(res.value);
    } catch (e) { /* first run — nothing saved yet */ }
    render();
  }
  function save() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
      try { await store.set(STORAGE_KEY, JSON.stringify(state)); }
      catch (e) { toast('Could not save — retrying'); setTimeout(save, 1500); }
    }, 250);
  }

  // ---------- model helpers ----------
  function targetForWeek(goal, weekStart) {
    let t = goal.targetHistory[0].target;
    for (const entry of goal.targetHistory) {
      if (entry.week <= weekStart) t = entry.target;
    }
    return t;
  }
  function detailForWeek(goal, weekStart) {
    if (!goal.detailHistory || goal.detailHistory.length === 0) return '';
    let d = goal.detailHistory[0].detail;
    for (const entry of goal.detailHistory) {
      if (entry.week <= weekStart) d = entry.detail;
    }
    return d;
  }
  function markCount(goalId, dateISO) { return state.marks[goalId + ':' + dateISO] || 0; }
  function hasNoteThisWeek(goal, weekStart) {
    if (!goal.notes || goal.notes.length === 0) return false;
    const dates = weekDates(weekStart);
    return goal.notes.some(n => dates.includes(n.date));
  }
  function weekTotal(goal, weekStart) {
    return weekDates(weekStart).reduce((s, d) => s + markCount(goal.id, d), 0);
  }
  // Migrates goals saved before the status model existed (single archivedWeek flag)
  // into the same week-scoped-history pattern used by target and detail.
  function ensureStatusHistory(g) {
    if (!g.statusHistory || !Array.isArray(g.statusHistory) || g.statusHistory.length === 0) {
      g.statusHistory = [{ week: g.createdWeek || '1970-01-01', status: 'active' }];
      if (g.archivedWeek) g.statusHistory.push({ week: g.archivedWeek, status: 'ended' });
      g.statusHistory.sort((a, b) => a.week < b.week ? -1 : 1);
    }
    return g.statusHistory;
  }
  function statusInfoForWeek(goal, weekStart) {
    const hist = ensureStatusHistory(goal);
    let cur = hist[0];
    for (const e of hist) { if (e.week <= weekStart) cur = e; }
    return cur; // { week, status }
  }
  function goalVisibleInWeek(goal, weekStart) {
    if (goal.createdWeek > weekStart) return false;
    return statusInfoForWeek(goal, weekStart).status !== 'ended';
  }

  // ---------- rendering ----------
  function render() {
    const todayISO = iso(new Date());
    const thisWeek = mondayOf(new Date());
    const dates = weekDates(viewWeek);

    // goals for this week, computed early since the week label's
    // firework accent depends on whether everything active is done
    const visible = state.goals.filter(g => goalVisibleInWeek(g, viewWeek));
    const activeThisWeek = visible.filter(g => statusInfoForWeek(g, viewWeek).status === 'active');
    const allDone = activeThisWeek.length > 0 &&
      activeThisWeek.every(g => weekTotal(g, viewWeek) >= targetForWeek(g, viewWeek));

    // week label
    const end = dates[6];
    const sameYear = viewWeek.slice(0, 4) === end.slice(0, 4);
    const isCurrent = viewWeek === thisWeek;
    const subLabel = isCurrent ? 'this week' : viewWeek > thisWeek ? 'upcoming' : 'past week';
    document.getElementById('weekLabel').innerHTML =
      '<span class="fw' + (allDone ? ' lit' : '') + '">✳</span> ' +
      fmtShort(viewWeek) + ' – ' + fmtShort(end) + (sameYear ? ', ' + end.slice(0, 4) : '') +
      ' <span class="fw' + (allDone ? ' lit' : '') + '">✳</span>' +
      '<span class="sub' + (isCurrent ? ' current' : '') + '">' + subLabel + '</span>';
    document.getElementById('todayBtn').style.visibility = isCurrent ? 'hidden' : 'visible';
    document.getElementById('todayOnlyBtn').classList.toggle('active', state.compact);
    document.getElementById('weekViewBtn').classList.toggle('active', !state.compact);

    const isCompact = state.compact; // "Today Only" now works from any browsed week — it always shows today

    // week navigation is meaningless in Today Only mode, since the cards
    // below no longer respond to it — hide it entirely rather than leave
    // controls on screen that quietly do nothing visible
    document.getElementById('weekNav').style.display = isCompact ? 'none' : 'flex';
    if (isCompact) document.getElementById('todayBtn').style.visibility = 'hidden';

    // day-of-week header — a single full date in compact mode, the usual 7-day strip otherwise
    document.getElementById('dayRow').innerHTML = isCompact
      ? '<span class="fulldate">' + fromISO(todayISO).toLocaleDateString('en-US',
          { weekday: 'long', month: 'long', day: 'numeric' }) + '</span>'
      : DAYS.map((d, i) => '<span>' + d + '\u00A0' + (+dates[i].slice(8)) + '</span>').join('');

    // Today Only is anchored to the actual current week and today's date,
    // regardless of which week's history you're browsing in the header above
    // it — otherwise a goal you ended last week would still show a checkbox
    // just because you happened to be looking at an older week.
    const refWeek = isCompact ? thisWeek : viewWeek;
    const cardGoals = isCompact ? state.goals.filter(g => goalVisibleInWeek(g, thisWeek)) : visible;

    // goal list
    const list = document.getElementById('goalList');
    if (cardGoals.length === 0) {
      list.innerHTML = '<div class="empty">' + (state.goals.length === 0
        ? 'No goals yet. Add your first one below.'
        : 'Nothing tracked this week.') + '</div>';
      return;
    }

    list.innerHTML = cardGoals.map((g, idx) => {
      const target = targetForWeek(g, refWeek);
      const total = weekTotal(g, refWeek);
      const detail = detailForWeek(g, refWeek);
      const noted = hasNoteThisWeek(g, refWeek);
      const status = statusInfoForWeek(g, refWeek).status;
      const isPaused = status === 'paused';

      if (isCompact) {
        const count = markCount(g.id, todayISO);
        const marked = count >= 1;
        const multi = marked && (g.perDayMax || 1) > 1
          ? '<span class="compactbadge">' + count + '</span>' : '';
        return '<div class="goal compact' + (isPaused ? ' paused' : '') + '" data-gid="' + g.id + '">' +
          '<div class="goal-head compact-row' + (marked ? ' marked' : '') + '"' +
            ' data-goal="' + g.id + '" data-date="' + todayISO + '">' +
            noteIcon(noted, g.id) +
            '<button class="goal-name" data-edit="' + g.id + '">' + esc(g.name) +
              (detail ? ' <span class="detail">' + esc(detail) + '</span>' : '') +
              (isPaused ? '<span class="notehint">paused</span>' : '') + '</button>' +
            '<span class="compact-fill"></span>' +
            '<span class="counter' + (total >= target ? ' met' : '') + '">' + total + '/' + target + '</span>' +
            multi +
          '</div>' +
        '</div>';
      }

      const cells = dates.map(d => {
        const count = markCount(g.id, d);
        const future = d > todayISO;
        const marked = count >= 1;
        const multi = marked && (g.perDayMax || 1) > 1
          ? '<span class="multicount">' + count + '</span>' : '';
        return '<div class="cell' + (future ? ' future' : '') + (d === todayISO ? ' today' : '') +
          (marked ? ' marked' : '') + '"' +
          (future ? '' : ' data-goal="' + g.id + '" data-date="' + d + '"') + '>' +
          '<span class="dnum">' + +d.slice(8) + '</span>' + multi + '</div>';
      }).join('');
      return '<div class="goal' + (isPaused ? ' paused' : '') + '" data-gid="' + g.id + '">' +
        '<div class="goal-head">' +
          noteIcon(noted, g.id) +
          '<button class="goal-name" data-edit="' + g.id + '">' + esc(g.name) +
            (detail ? ' <span class="detail">' + esc(detail) + '</span>' : '') +
            (isPaused ? '<span class="notehint">paused</span>' : '') + '</button>' +
          '<span class="counter' + (total >= target ? ' met' : '') + '">' + total + '/' + target + '</span>' +
          '<div class="reorderbtns">' +
            '<button data-move="' + g.id + '" data-dir="-1"' + (idx === 0 ? ' disabled' : '') + '>▲</button>' +
            '<button data-move="' + g.id + '" data-dir="1"' + (idx === visible.length - 1 ? ' disabled' : '') + '>▼</button>' +
          '</div>' +
        '</div>' +
        '<div class="days">' + cells + '</div>' +
      '</div>';
    }).join('');
  }

  function esc(s) {
    return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function noteIcon(lit, gid) {
    return '<span class="notedot' + (lit ? ' lit' : '') + '" data-edit="' + gid + '" title="' +
      (lit ? 'Note added this week' : 'No note yet this week') + '">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
        'stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M6 3h9l5 5v13a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/>' +
        '<path d="M9 8h3M9 12h6M9 16h6"/>' +
      '</svg></span>';
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1600);
  }

  // ---------- interactions ----------
  document.getElementById('goalList').addEventListener('click', e => {
    const moveBtn = e.target.closest('[data-move]');
    if (moveBtn) {
      moveGoal(moveBtn.dataset.move, +moveBtn.dataset.dir);
      return;
    }
    // the name button must win even when it sits inside a tappable
    // checkbox row (compact mode), so it's checked before the toggle
    const editBtn = e.target.closest('[data-edit]');
    if (editBtn) { openEdit(editBtn.dataset.edit); return; }

    const target = e.target.closest('[data-goal][data-date]');
    if (target) {
      const gid = target.dataset.goal, date = target.dataset.date;
      const goal = state.goals.find(g => g.id === gid);
      if (!goal || statusInfoForWeek(goal, viewWeek).status === 'paused') return;
      const key = gid + ':' + date;
      const max = goal.perDayMax || 1;
      const next = (markCount(gid, date) + 1) % (max + 1);
      if (next === 0) delete state.marks[key]; else state.marks[key] = next;
      save(); render();
    }
  });

  function moveGoal(gid, dir) {
    const visible = state.goals.filter(g => goalVisibleInWeek(g, viewWeek));
    const vIdx = visible.findIndex(g => g.id === gid);
    const targetIdx = vIdx + dir;
    if (vIdx === -1 || targetIdx < 0 || targetIdx >= visible.length) return;
    const otherId = visible[targetIdx].id;
    const fullA = state.goals.findIndex(g => g.id === gid);
    const fullB = state.goals.findIndex(g => g.id === otherId);
    if (fullA === -1 || fullB === -1) return;
    [state.goals[fullA], state.goals[fullB]] = [state.goals[fullB], state.goals[fullA]];
    save(); render();
  }

  document.getElementById('prevWeek').onclick = () => { viewWeek = addDays(viewWeek, -7); render(); };
  document.getElementById('nextWeek').onclick = () => { viewWeek = addDays(viewWeek, 7); render(); };
  document.getElementById('todayBtn').onclick = () => { viewWeek = mondayOf(new Date()); render(); };
  document.getElementById('todayOnlyBtn').onclick = () => { state.compact = true; save(); render(); };
  document.getElementById('weekViewBtn').onclick = () => { state.compact = false; save(); render(); };
  document.getElementById('addBtn').onclick = openAdd;
  document.getElementById('dataBtn').onclick = openData;
  document.getElementById('todoBtn').onclick = openTodo;

  // ---------- standalone to-do list (no goals, no dates, no weeks) ----------
  function openTodo() {
    if (!Array.isArray(state.todos)) state.todos = [];
    const itemsHtml = state.todos.length === 0
      ? '<div class="note auto"><div class="ncontent"><span class="ntext">Nothing on the list.</span></div></div>'
      : state.todos.map((t, i) =>
          '<div class="todoitem' + (t.done ? ' done' : '') + '">' +
            '<button class="todocheck" data-toggle="' + i + '" aria-label="Toggle done"></button>' +
            '<span class="todotext" data-toggle="' + i + '">' + esc(t.text) + '</span>' +
            '<button class="ndelete" data-deltodo="' + i + '" title="Delete">×</button>' +
          '</div>'
        ).join('');

    openSheet(
      '<h2>To-Do</h2>' +
      '<div class="todolist">' + itemsHtml + '</div>' +
      '<hr class="divider">' +
      '<div class="field"><input id="f-todotext" placeholder="Add something\u2026" autocomplete="off"></div>' +
      '<div class="btnrow"><button class="btn primary" id="f-todoadd">Add</button></div>' +
      '<div class="btnrow" style="margin-top:14px"><button class="btn quiet" id="f-cancel">Close</button></div>'
    );

    document.getElementById('f-cancel').onclick = closeSheet;

    const input = document.getElementById('f-todotext');
    function addItem() {
      const txt = input.value.trim();
      if (!txt) return;
      state.todos.push({ id: 't' + Date.now() + Math.random().toString(36).slice(2, 6), text: txt, done: false });
      save(); openTodo(); // re-render with the new item, keep the sheet open
    }
    document.getElementById('f-todoadd').onclick = addItem;
    input.onkeydown = e => { if (e.key === 'Enter') addItem(); };
    setTimeout(() => input.focus(), 60);

    document.querySelector('.todolist').addEventListener('click', e => {
      const del = e.target.closest('[data-deltodo]');
      if (del) {
        state.todos.splice(+del.dataset.deltodo, 1);
        save(); openTodo();
        return;
      }
      const tog = e.target.closest('[data-toggle]');
      if (tog) {
        const i = +tog.dataset.toggle;
        state.todos[i].done = !state.todos[i].done;
        save(); openTodo();
      }
    });
  }

  // ---------- backup / restore ----------
  function openData() {
    const json = JSON.stringify(state);
    openSheet(
      '<h2>Backup &amp; restore</h2>' +
      '<div class="field"><label>Save writes your complete ledger — goals, marks, notes, history — to a file you choose. ' +
        'Load restores from a saved file, replacing what\u2019s here.</label></div>' +
      '<div class="btnrow">' +
        '<button class="btn primary" id="f-savefile">Save backup file</button>' +
        '<button class="btn" id="f-loadfile">Load backup file</button>' +
      '</div>' +
      '<input type="file" id="f-file" accept=".json,application/json,text/plain" style="display:none">' +
      '<hr class="divider">' +
      '<div class="field"><label>Export just the setup — goal names, weekly targets, details — with no marks or notes. ' +
        'Good for handing your routine to someone else without your personal history.</label></div>' +
      '<div class="btnrow"><button class="btn" id="f-savetemplate">Export Goal Template</button></div>' +
      '<hr class="divider">' +
      '<div class="field"><label>Or work with the backup as text — copy it out, or paste one in and press Import.</label>' +
        '<textarea id="f-data" style="min-height:120px;font-family:var(--mono);font-size:11px" spellcheck="false"></textarea></div>' +
      '<div class="btnrow">' +
        '<button class="btn" id="f-copy">Copy backup</button>' +
        '<button class="btn" id="f-import">Import what\u2019s in the box</button>' +
      '</div>' +
      '<div class="btnrow" style="margin-top:10px">' +
        '<button class="btn quiet" id="f-cancel">Close</button>' +
        '<button class="btn danger" id="f-clear">Clear all data</button>' +
      '</div>'
    );
    const box = document.getElementById('f-data');
    box.value = json;
    document.getElementById('f-cancel').onclick = closeSheet;

    function applyBackup(text) {
      let parsed;
      try { parsed = JSON.parse(text); }
      catch (e) { toast('That isn\u2019t valid backup text'); return; }
      if (!parsed || !Array.isArray(parsed.goals) || typeof parsed.marks !== 'object' || parsed.marks === null) {
        toast('That isn\u2019t a ledger backup'); return;
      }
      if (!Array.isArray(parsed.todos)) parsed.todos = [];
      for (const g of parsed.goals) {
        if (!Array.isArray(g.targetHistory) || g.targetHistory.length === 0) { toast('Backup is missing goal history'); return; }
        if (!Array.isArray(g.notes)) g.notes = [];
        if (!Array.isArray(g.detailHistory)) g.detailHistory = [];
        if (!Array.isArray(g.statusHistory)) g.statusHistory = [];
      }
      if (!confirm('Restore this backup? It replaces everything currently in the ledger.')) return;
      state = parsed;
      save(); closeSheet(); render();
      toast('Backup restored');
    }

    document.getElementById('f-savefile').onclick = async () => {
      const name = 'ledger-backup-' + iso(new Date()) + '.json';
      const blob = new Blob([JSON.stringify(state)], { type: 'application/json' });
      const file = new File([blob], name, { type: 'application/json' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file] }); toast('Backup saved'); }
        catch (e) { /* user cancelled the share sheet — no-op */ }
        return;
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    };

    document.getElementById('f-savetemplate').onclick = async () => {
      const todayWk = mondayOf(new Date());
      // Only goals you're actually running right now — paused/ended goals
      // are personal situation, not part of "the routine" to hand off.
      const activeGoals = state.goals.filter(g => statusInfoForWeek(g, todayWk).status === 'active');
      if (activeGoals.length === 0) { toast('No active goals to export'); return; }
      const templateGoals = activeGoals.map(g => {
        const target = targetForWeek(g, todayWk);
        const detail = detailForWeek(g, todayWk);
        return {
          id: 'g' + Date.now() + Math.random().toString(36).slice(2, 7),
          name: g.name,
          perDayMax: g.perDayMax || 1,
          createdWeek: todayWk,
          statusHistory: [{ week: todayWk, status: 'active' }],
          targetHistory: [{ week: todayWk, target }],
          detailHistory: detail ? [{ week: todayWk, detail }] : [],
          notes: []
        };
      });
      const templateData = { goals: templateGoals, marks: {} };
      const name = 'ledger-template-' + todayWk + '.json';
      const blob = new Blob([JSON.stringify(templateData)], { type: 'application/json' });
      const file = new File([blob], name, { type: 'application/json' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        try { await navigator.share({ files: [file] }); toast('Template saved'); }
        catch (e) { /* user cancelled the share sheet — no-op */ }
        return;
      }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = name;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 4000);
    };

    document.getElementById('f-loadfile').onclick = () => document.getElementById('f-file').click();
    document.getElementById('f-file').onchange = e => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = () => applyBackup(reader.result);
      reader.onerror = () => toast('Could not read that file');
      reader.readAsText(f);
    };

    document.getElementById('f-copy').onclick = async () => {
      try {
        await navigator.clipboard.writeText(box.value);
        toast('Backup copied');
      } catch (e) {
        box.focus(); box.select();
        try { document.execCommand('copy'); toast('Backup copied'); }
        catch (e2) { toast('Select the text and copy manually'); }
      }
    };

    document.getElementById('f-import').onclick = () => applyBackup(box.value);

    document.getElementById('f-clear').onclick = () => {
      if (!confirm('Erase every goal, mark, note, and to-do? If you haven\u2019t saved a backup file, this is gone for good.')) return;
      state = { goals: [], marks: {}, todos: [] };
      save(); closeSheet(); render();
      toast('Ledger cleared');
    };
  }

  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target.id === 'overlay') closeSheet();
  });

  function openSheet(html) {
    document.getElementById('sheet').innerHTML = html;
    document.getElementById('overlay').classList.add('open');
  }
  function closeSheet() {
    document.getElementById('overlay').classList.remove('open');
    editingId = null;
  }

  // ---------- add goal ----------
  function openAdd() {
    openSheet(
      '<h2>New goal</h2>' +
      '<div class="field"><label>Name</label><input id="f-name" placeholder="Jog" autocomplete="off"></div>' +
      '<div class="field"><label>Detail (optional)</label><input id="f-detail" placeholder="1/2 mile" autocomplete="off"></div>' +
      '<div class="row2">' +
        '<div class="field"><label>Times per week</label><input id="f-target" type="number" min="1" max="21" value="3"></div>' +
        '<div class="field"><label>Max checks per day</label><input id="f-max" type="number" min="1" max="6" value="1"></div>' +
      '</div>' +
      '<div class="btnrow">' +
        '<button class="btn quiet" id="f-cancel">Cancel</button>' +
        '<button class="btn primary" id="f-save">Add goal</button>' +
      '</div>'
    );
    document.getElementById('f-cancel').onclick = closeSheet;
    document.getElementById('f-save').onclick = () => {
      const name = document.getElementById('f-name').value.trim();
      const target = Math.max(1, +document.getElementById('f-target').value || 3);
      const max = Math.max(1, +document.getElementById('f-max').value || 1);
      const detail = document.getElementById('f-detail').value.trim();
      if (!name) { document.getElementById('f-name').focus(); return; }
      const createdWk = viewWeek <= mondayOf(new Date()) ? viewWeek : mondayOf(new Date());
      state.goals.push({
        id: 'g' + Date.now(),
        name, perDayMax: max,
        createdWeek: createdWk,
        statusHistory: [{ week: createdWk, status: 'active' }],
        targetHistory: [{ week: viewWeek, target }],
        detailHistory: detail ? [{ week: viewWeek, detail }] : [],
        notes: []
      });
      save(); closeSheet(); render();
    };
    setTimeout(() => document.getElementById('f-name').focus(), 60);
  }

  // ---------- pause / end / resume / reactivate ----------
  function openWeekChoice(title, onPick) {
    const thisWk = mondayOf(new Date());
    const nextWk = addDays(thisWk, 7);
    openSheet(
      '<h2>' + esc(title) + '</h2>' +
      '<div class="field"><label>Choose when this takes effect.</label></div>' +
      '<div class="btnrow">' +
        '<button class="btn" id="wc-this">This week — ' + fmtShort(thisWk) + '</button>' +
        '<button class="btn" id="wc-next">Next week — ' + fmtShort(nextWk) + '</button>' +
      '</div>' +
      '<div class="btnrow" style="margin-top:10px"><button class="btn quiet" id="wc-cancel">Cancel</button></div>'
    );
    document.getElementById('wc-this').onclick = () => onPick(thisWk);
    document.getElementById('wc-next').onclick = () => onPick(nextWk);
    document.getElementById('wc-cancel').onclick = () => onPick(null);
  }

  function setGoalStatus(g, gid, status, verb) {
    const titles = { paused: 'Pause goal', ended: 'End goal', active: 'Reactivate goal' };
    openWeekChoice(titles[status] + ' — starting when?', wk => {
      if (!wk) { openEdit(gid); return; } // cancelled — go back to the editor
      ensureStatusHistory(g);
      g.statusHistory = g.statusHistory.filter(e => e.week !== wk);
      g.statusHistory.push({ week: wk, status });
      g.statusHistory.sort((a, b) => a.week < b.week ? -1 : 1);
      g.notes.push({ date: iso(new Date()), text: verb + ' starting ' + fmtShort(wk), auto: true });
      save(); closeSheet(); render();
    });
  }

  // ---------- edit goal ----------
  function openEdit(gid) {
    const g = state.goals.find(x => x.id === gid);
    if (!g) return;
    editingId = gid;
    const currentTarget = targetForWeek(g, mondayOf(new Date()));
    const currentDetail = detailForWeek(g, mondayOf(new Date()));
    const statusNow = statusInfoForWeek(g, mondayOf(new Date()));
    const statusLine = statusNow.status === 'active' ? '' :
      '<div class="field"><label>Status</label><span style="font-size:14px;color:var(--muted)">' +
      (statusNow.status === 'paused' ? 'Paused since ' : 'Ended since ') + fmtShort(statusNow.week) +
      '</span></div>';

    // history strip: last 8 finished-or-current weeks since creation
    const thisWeek = mondayOf(new Date());
    let hist = '';
    let w = thisWeek;
    for (let i = 0; i < 8; i++) {
      if (w < g.createdWeek) break;
      const t = targetForWeek(g, w);
      const n = weekTotal(g, w);
      hist = '<span class="h' + (n >= t ? ' met' : '') + '">' + fmtShort(w).replace(' ', '\u00A0') + '&nbsp;·&nbsp;' + n + '/' + t + '</span>' + hist;
      w = addDays(w, -7);
    }

    const notesHtml = g.notes.length === 0
      ? '<div class="note auto"><div class="ncontent"><span class="ntext">No notes yet.</span></div></div>'
      : g.notes.map((n, i) => ({ n, i })).reverse().map(({ n, i }) =>
          '<div class="note' + (n.auto ? ' auto' : '') + '">' +
            '<div class="ncontent"><span class="ndate">' + fmtNote(n.date) + '</span>' +
            '<span class="ntext">' + esc(n.text) + '</span></div>' +
            '<button class="ndelete" data-delnote="' + i + '" title="Delete note">×</button>' +
          '</div>'
        ).join('');

    let lifecycleHtml;
    if (statusNow.status === 'ended') {
      lifecycleHtml = '<div class="btnrow"><button class="btn" id="f-reactivate">Reactivate Goal</button></div>';
    } else if (statusNow.status === 'paused') {
      lifecycleHtml =
        '<div class="btnrow">' +
          '<button class="btn" id="f-resume">Resume Goal</button>' +
          '<button class="btn" id="f-end">End Goal (keep history)</button>' +
        '</div>';
    } else {
      lifecycleHtml =
        '<div class="btnrow">' +
          '<button class="btn" id="f-pause">Pause Goal (keep history)</button>' +
          '<button class="btn" id="f-end">End Goal (keep history)</button>' +
        '</div>';
    }

    openSheet(
      '<h2>Edit goal</h2>' +
      '<div class="field"><label>Name</label><input id="f-name" value="' + esc(g.name) + '"></div>' +
      '<div class="field"><label>Detail (carries forward from this week)</label>' +
        '<input id="f-detail" value="' + esc(currentDetail) + '" placeholder="e.g. 1 mile"></div>' +
      '<div class="row2">' +
        '<div class="field"><label>Times per week (from this week on)</label>' +
          '<input id="f-target" type="number" min="1" max="21" value="' + currentTarget + '"></div>' +
        '<div class="field"><label>Max checks per day</label>' +
          '<input id="f-max" type="number" min="1" max="6" value="' + (g.perDayMax || 1) + '"></div>' +
      '</div>' +
      statusLine +
      '<div class="btnrow">' +
        '<button class="btn quiet" id="f-cancel">Cancel</button>' +
        '<button class="btn primary" id="f-save">Save changes</button>' +
      '</div>' +
      '<hr class="divider">' +
      '<h2>Recent weeks</h2><div class="histstrip">' + hist + '</div>' +
      '<hr class="divider">' +
      '<h2>' + noteIcon(hasNoteThisWeek(g, viewWeek)) + 'Notes</h2>' +
      '<div class="field"><textarea id="f-note" placeholder="e.g. Bumping to 5×/week — morning and night"></textarea></div>' +
      '<div class="btnrow"><button class="btn" id="f-addnote">Add note</button></div>' +
      '<div class="notelog">' + notesHtml + '</div>' +
      '<hr class="divider">' +
      lifecycleHtml +
      '<div class="btnrow" style="margin-top:10px">' +
        '<button class="btn danger" id="f-del">Delete Forever (remove history)</button>' +
      '</div>'
    );

    document.getElementById('f-cancel').onclick = closeSheet;

    document.getElementById('f-save').onclick = () => {
      const name = document.getElementById('f-name').value.trim();
      const newTarget = Math.max(1, +document.getElementById('f-target').value || currentTarget);
      const newMax = Math.max(1, +document.getElementById('f-max').value || 1);
      const newDetail = document.getElementById('f-detail').value.trim();
      if (name) g.name = name;
      g.perDayMax = newMax;
      if (newDetail !== currentDetail) {
        const wk = mondayOf(new Date());
        if (!g.detailHistory) g.detailHistory = [];
        g.detailHistory = g.detailHistory.filter(e => e.week !== wk);
        g.detailHistory.push({ week: wk, detail: newDetail });
        g.detailHistory.sort((a, b) => a.week < b.week ? -1 : 1);
        g.notes.push({ date: iso(new Date()), text: 'Detail: ' + (currentDetail || '—') + ' → ' + (newDetail || '—'), auto: true });
      }
      if (newTarget !== currentTarget) {
        const wk = mondayOf(new Date());
        g.targetHistory = g.targetHistory.filter(e => e.week !== wk);
        g.targetHistory.push({ week: wk, target: newTarget });
        g.targetHistory.sort((a, b) => a.week < b.week ? -1 : 1);
        g.notes.push({ date: iso(new Date()), text: 'Target changed to ' + newTarget + '×/week', auto: true });
      }
      save(); closeSheet(); render();
    };

    document.getElementById('f-addnote').onclick = () => {
      const txt = document.getElementById('f-note').value.trim();
      if (!txt) return;
      g.notes.push({ date: iso(new Date()), text: txt });
      save(); openEdit(gid); // re-render sheet with the new note
    };

    document.querySelector('.notelog').addEventListener('click', e => {
      const btn = e.target.closest('[data-delnote]');
      if (!btn) return;
      const i = +btn.dataset.delnote;
      g.notes.splice(i, 1);
      save(); openEdit(gid); // re-render sheet without the deleted note
    });

    if (statusNow.status === 'ended') {
      document.getElementById('f-reactivate').onclick = () => setGoalStatus(g, gid, 'active', 'Reactivated');
    } else if (statusNow.status === 'paused') {
      document.getElementById('f-resume').onclick = () => setGoalStatus(g, gid, 'active', 'Resumed');
      document.getElementById('f-end').onclick = () => setGoalStatus(g, gid, 'ended', 'Ended');
    } else {
      document.getElementById('f-pause').onclick = () => setGoalStatus(g, gid, 'paused', 'Paused');
      document.getElementById('f-end').onclick = () => setGoalStatus(g, gid, 'ended', 'Ended');
    }

    document.getElementById('f-del').onclick = () => {
      if (!confirm('Delete "' + g.name + '" and all its history? This cannot be undone.')) return;
      state.goals = state.goals.filter(x => x.id !== gid);
      for (const k of Object.keys(state.marks)) {
        if (k.startsWith(gid + ':')) delete state.marks[k];
      }
      save(); closeSheet(); render();
    };
  }

  load();
})();
</script>
</body>
</html>
